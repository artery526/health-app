<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>醫館 · 頭痛紀錄</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark: #2d5a27;
      --green-mid: #3d7a34;
      --green-light: #e8f0e6;
      --green-sidebar: #1e3d1a;
      --green-nav: #f0f5ee;
      --cream: #faf8f4;
      --warm-gray: #f5f2ec;
      --text-main: #1a2e17;
      --text-muted: #6b7c69;
      --text-hint: #9dab9a;
      --border: #dde8d8;
      --border-light: #edf3eb;
      --white: #ffffff;
    }

    html, body {
      height: 100%;
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--warm-gray);
      color: var(--text-main);
      font-size: 13px;
      line-height: 1.6;
    }

    /* ── Layout ── */
    .layout { display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: 164px;
      flex-shrink: 0;
      background: var(--green-sidebar);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-logo {
      padding: 20px 16px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .logo-flower { font-size: 26px; line-height: 1; margin-bottom: 6px; display: block; }
    .logo-title { font-family: 'Noto Serif TC', serif; font-size: 16px; color: #fff; font-weight: 500; }
    .logo-sub { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 2px; }
    .sidebar-nav { flex: 1; padding: 10px 0; overflow-y: auto; }
    .nav-item {
      display: flex; align-items: center; gap: 9px;
      padding: 11px 16px; cursor: pointer;
      color: rgba(255,255,255,0.5);
      font-size: 12.5px;
      border-left: 2px solid transparent;
      transition: all 0.15s;
      user-select: none;
    }
    .nav-item:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.85); }
    .nav-item.active {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border-left-color: #7fc47a;
    }
    .nav-icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .help-btn {
      display: flex; align-items: center; gap: 6px;
      color: rgba(255,255,255,0.38); font-size: 11px; cursor: pointer;
    }
    .help-btn:hover { color: rgba(255,255,255,0.65); }

    /* ── Main area ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    /* ── Topbar ── */
    .topbar {
      background: var(--white);
      border-bottom: 1px solid var(--border-light);
      padding: 0 22px;
      height: 50px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .topbar-left { display: flex; align-items: baseline; gap: 8px; }
    .page-title { font-size: 16px; font-weight: 500; }
    .page-sub { font-size: 11px; color: var(--text-hint); }
    .topbar-right { display: flex; align-items: center; gap: 18px; }
    .topnav { display: flex; }
    .topnav-item {
      padding: 0 12px; height: 50px; line-height: 50px;
      font-size: 12px; color: var(--text-muted); cursor: pointer;
      border-bottom: 2px solid transparent;
      display: flex; align-items: center; gap: 5px;
      transition: all 0.12s;
    }
    .topnav-item:hover { color: var(--text-main); }
    .topnav-item.active { color: var(--green-dark); border-bottom-color: var(--green-dark); font-weight: 500; }
    .avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--green-light); display: flex;
      align-items: center; justify-content: center;
      font-size: 14px; color: var(--green-dark);
      cursor: pointer; border: 1px solid var(--border);
    }

    /* ── Content ── */
    .content {
      flex: 1; overflow-y: auto; padding: 16px 18px;
      display: flex; gap: 14px; min-height: 0;
    }

    /* ── Left form column ── */
    .form-col { width: 480px; flex-shrink: 0; display: flex; flex-direction: column; gap: 11px; }

    .panel {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
    }
    .panel-header {
      font-size: 13px; font-weight: 500;
      display: flex; align-items: center; gap: 7px;
      margin-bottom: 12px;
    }
    .step-badge {
      width: 19px; height: 19px; border-radius: 50%;
      background: var(--green-dark); color: #fff;
      font-size: 10px; font-weight: 500;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* API bar */
    .api-bar {
      background: var(--green-light);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
    }
    .api-bar-title { font-size: 11px; font-weight: 500; color: var(--green-dark); margin-bottom: 8px; }
    .api-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .api-bar-row:last-child { margin-bottom: 0; }
    .api-bar label { font-size: 11px; color: var(--text-muted); white-space: nowrap; width: 72px; flex-shrink: 0; }
    .api-bar input {
      flex: 1; border: 1px solid var(--border); border-radius: 5px;
      padding: 5px 9px; font-size: 11px;
      background: #fff; color: var(--text-main); outline: none;
      font-family: 'Noto Sans TC', sans-serif;
    }
    .api-bar input:focus { border-color: var(--green-mid); }

    /* Time fields */
    .time-row { display: flex; gap: 9px; }
    .time-field {
      flex: 1; display: flex; align-items: center; gap: 7px;
      border: 1px solid var(--border); border-radius: 7px;
      padding: 6px 11px; background: #fafaf8;
    }
    .time-field input {
      border: none; outline: none; background: transparent;
      font-size: 13px; color: var(--text-main); width: 100%;
      font-family: 'Noto Sans TC', sans-serif;
    }
    .time-icon { font-size: 15px; color: var(--text-muted); flex-shrink: 0; }

    /* Diagram */
    .diagram-row { display: flex; gap: 12px; }
    .diagram-left { flex: 1; min-width: 0; }
    .view-tabs { display: flex; gap: 5px; margin-bottom: 9px; }
    .vtab {
      padding: 4px 13px; border: 1px solid var(--border);
      border-radius: 5px; font-size: 11px; cursor: pointer;
      background: #fff; color: var(--text-muted);
      transition: all 0.12s; font-family: 'Noto Sans TC', sans-serif;
    }
    .vtab:hover { background: var(--green-nav); }
    .vtab.active { background: var(--green-dark); color: #fff; border-color: var(--green-dark); }
    .svg-wrap svg { width: 100%; display: block; }
    .diagram-hint { font-size: 10px; color: var(--text-hint); text-align: center; margin-top: 6px; }

    /* Selected list */
    .sel-col { width: 162px; flex-shrink: 0; }
    .sel-col-title { font-size: 11px; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; }
    .sel-item {
      display: flex; align-items: flex-start; gap: 5px;
      padding: 7px 9px;
      border: 1px solid var(--border-light);
      border-radius: 7px; margin-bottom: 6px;
      background: var(--cream);
    }
    .sel-item-body { flex: 1; min-width: 0; }
    .sel-item-name { font-size: 11px; font-weight: 500; }
    .sel-item-meridian { font-size: 10px; color: var(--text-hint); margin-top: 1px; line-height: 1.4; }
    .sel-item-acupoint { font-size: 10px; color: var(--green-dark); margin-top: 2px; font-weight: 500; }
    .sel-remove {
      cursor: pointer; font-size: 16px; color: var(--text-hint);
      line-height: 1; flex-shrink: 0; padding: 0 2px;
    }
    .sel-remove:hover { color: #c46a6a; }
    .sel-empty { font-size: 11px; color: var(--text-hint); text-align: center; padding: 18px 0; line-height: 1.8; }

    /* Severity */
    .sev-row { display: flex; gap: 7px; }
    .sev-cell { flex: 1; }
    .sev-btn {
      width: 100%; padding: 8px 4px;
      border: 1px solid var(--border); border-radius: 7px;
      background: #fff; cursor: pointer; text-align: center;
      transition: all 0.12s; font-family: 'Noto Sans TC', sans-serif;
    }
    .sev-btn:hover { border-color: var(--green-mid); background: var(--green-light); }
    .sev-btn.active { border-color: var(--green-dark); background: var(--green-light); }
    .sev-emoji { font-size: 22px; display: block; }
    .sev-label { font-size: 10px; color: var(--text-muted); margin-top: 3px; }

    /* Note */
    textarea.note {
      width: 100%; border: 1px solid var(--border);
      border-radius: 7px; padding: 8px 11px;
      font-size: 12px; color: var(--text-main);
      background: #fafaf8; resize: none; height: 60px;
      font-family: 'Noto Sans TC', sans-serif; outline: none;
    }
    textarea.note:focus { border-color: var(--green-mid); }
    textarea.note::placeholder { color: var(--text-hint); }

    /* Buttons */
    .btn-row { display: flex; gap: 9px; }
    .btn-clear {
      padding: 9px 16px;
      border: 1px solid var(--border); border-radius: 7px;
      background: #fff; color: var(--text-muted);
      font-size: 12.5px; cursor: pointer;
      font-family: 'Noto Sans TC', sans-serif;
      transition: all 0.12s;
    }
    .btn-clear:hover { background: var(--warm-gray); }
    .btn-save {
      flex: 1; padding: 9px;
      border: none; border-radius: 7px;
      background: var(--green-dark); color: #fff;
      font-size: 13px; font-weight: 500; cursor: pointer;
      font-family: 'Noto Sans TC', sans-serif;
      transition: opacity 0.12s;
    }
    .btn-save:hover { opacity: 0.88; }
    .btn-save:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Right records column ── */
    .records-col { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 11px; }

    .records-panel { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .records-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-shrink: 0; }
    .records-title { font-size: 13px; font-weight: 500; }
    .records-actions { display: flex; gap: 7px; }
    .btn-export {
      padding: 5px 12px; border: 1px solid var(--border); border-radius: 5px;
      background: #fff; font-size: 11px; color: var(--text-muted);
      cursor: pointer; font-family: 'Noto Sans TC', sans-serif;
      display: flex; align-items: center; gap: 4px; transition: all 0.12s;
    }
    .btn-export:hover { background: var(--warm-gray); }
    .btn-stats {
      padding: 5px 12px; border: 1px solid var(--green-dark); border-radius: 5px;
      background: var(--green-light); font-size: 11px; color: var(--green-dark);
      cursor: pointer; font-family: 'Noto Sans TC', sans-serif;
      display: flex; align-items: center; gap: 4px;
    }

    .table-wrap { flex: 1; overflow-y: auto; min-height: 0; }
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left; color: var(--text-muted);
      padding: 6px 9px; font-weight: 400; font-size: 11px;
      border-bottom: 1px solid var(--border-light);
      position: sticky; top: 0; background: #fff; z-index: 1;
    }
    td { padding: 9px 9px; border-bottom: 1px solid var(--border-light); vertical-align: middle; font-size: 12px; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: var(--green-nav); }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .loc-chips { display: flex; flex-wrap: wrap; gap: 3px; }
    .loc-chip { display: flex; align-items: center; gap: 3px; font-size: 10.5px; }
    .sev-face { font-size: 17px; }
    .note-cell { color: var(--text-muted); max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .act-btn { background: none; border: none; cursor: pointer; color: var(--text-hint); font-size: 15px; padding: 3px 4px; border-radius: 4px; }
    .act-btn:hover { background: var(--green-nav); color: var(--text-main); }

    .pagination { display: flex; align-items: center; justify-content: center; gap: 5px; margin-top: 12px; flex-shrink: 0; }
    .pg-btn {
      width: 28px; height: 28px; border: 1px solid var(--border);
      border-radius: 5px; background: #fff; font-size: 12px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-family: 'Noto Sans TC', sans-serif;
      transition: all 0.12s;
    }
    .pg-btn:hover { background: var(--green-nav); }
    .pg-btn.active { background: var(--green-dark); color: #fff; border-color: var(--green-dark); }
    .pg-arrow { color: var(--text-hint); }
    .pg-arrow:hover { background: var(--warm-gray); }

    /* Toast */
    .toast {
      position: fixed; bottom: 22px; right: 22px;
      padding: 11px 18px; border-radius: 9px; font-size: 12.5px; font-weight: 500;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15); z-index: 9999;
      display: none; max-width: 300px;
      font-family: 'Noto Sans TC', sans-serif;
      animation: slideUp 0.22s ease;
    }
    .toast.show { display: block; }
    .toast.success { background: var(--green-dark); color: #fff; }
    .toast.error { background: #c46a6a; color: #fff; }
    .toast.info { background: #fff; color: var(--text-main); border: 1px solid var(--border); }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Empty state */
    .empty-row td { text-align: center; padding: 36px; color: var(--text-hint); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #b8c8b4; }

    /* Mobile responsive */
    @media (max-width: 768px) {
      .sidebar { width: 0; overflow: hidden; }
      .content { flex-direction: column; padding: 10px; }
      .form-col { width: 100%; }
      .topbar-right .topnav { display: none; }
    }
  </style>
</head>
<body>

<div class="layout">
  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-flower">✿</span>
      <div class="logo-title">醫館</div>
      <div class="logo-sub">頭痛紀錄</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item"><span class="nav-icon">⌂</span>首頁</div>
      <div class="nav-item active"><span class="nav-icon">✦</span>醫館</div>
      <div class="nav-item"><span class="nav-icon">📊</span>紀錄統計</div>
      <div class="nav-item"><span class="nav-icon">◎</span>穴位圖鑑</div>
      <div class="nav-item"><span class="nav-icon">◈</span>調理建議</div>
      <div class="nav-item"><span class="nav-icon">⚙</span>設定</div>
    </nav>
    <div class="sidebar-footer">
      <div class="help-btn"><span>❓</span><span>使用說明</span></div>
    </div>
  </aside>

  <!-- ── Main ── -->
  <div class="main">
    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-left">
        <span class="page-title">頭痛紀錄</span>
        <span class="page-sub">記錄頭痛發生的時間、位置與對應筋絡，幫助您了解頭痛狀況。</span>
      </div>
      <div class="topbar-right">
        <nav class="topnav">
          <div class="topnav-item">⌂ 首頁</div>
          <div class="topnav-item active">✦ 醫館</div>
          <div class="topnav-item">📊 紀錄統計</div>
          <div class="topnav-item">⚙ 設定</div>
        </nav>
        <div class="avatar">👤</div>
      </div>
    </header>

    <!-- Content -->
    <div class="content">

      <!-- ── Left: Form ── -->
      <div class="form-col">

        <!-- API Settings -->
        <div class="api-bar">
          <div class="api-bar-title">🔗 Google 試算表同步設定</div>
          <div class="api-bar-row">
            <label>試算表 ID</label>
            <input id="sheetId" value="1Z8cW96qqk5J7LL0mGg12GxmdZc_5elwDe4rEcGq-P-M" placeholder="貼入 Google 試算表 ID" />
          </div>
          <div class="api-bar-row">
            <label>API Key</label>
            <input id="apiKey" type="password" placeholder="Google Sheets API Key（需開啟 Sheets API）" />
          </div>
        </div>

        <!-- Step 1: Time -->
        <div class="panel">
          <div class="panel-header">
            <div class="step-badge">1</div>
            選擇頭痛時間
          </div>
          <div class="time-row">
            <div class="time-field">
              <span class="time-icon">📅</span>
              <input type="date" id="dateIn" />
            </div>
            <div class="time-field">
              <span class="time-icon">🕐</span>
              <input type="time" id="timeIn" />
            </div>
          </div>
        </div>

        <!-- Step 2: Location -->
        <div class="panel">
          <div class="panel-header">
            <div class="step-badge">2</div>
            點選頭痛位置（可多選）
          </div>
          <div class="diagram-row">
            <div class="diagram-left">
              <div class="view-tabs">
                <button class="vtab active" onclick="switchView('front',this)">正面</button>
                <button class="vtab" onclick="switchView('side',this)">側面</button>
                <button class="vtab" onclick="switchView('back',this)">背後</button>
              </div>
              <div class="svg-wrap">
                <svg id="headSvg" viewBox="0 0 200 265" xmlns="http://www.w3.org/2000/svg"></svg>
              </div>
              <div class="diagram-hint">提示：可點擊多個位置進行記錄</div>
            </div>
            <div class="sel-col">
              <div class="sel-col-title">已選擇的位置與對應筋絡</div>
              <div id="selList"><div class="sel-empty">尚未選擇位置<br>可多選</div></div>
            </div>
          </div>
        </div>

        <!-- Step 3: Severity -->
        <div class="panel">
          <div class="panel-header"><div class="step-badge">3</div>頭痛強度（選填）</div>
          <div class="sev-row">
            <div class="sev-cell"><button class="sev-btn" onclick="setSev(1,this)"><span class="sev-emoji">😊</span><div class="sev-label">無微</div></button></div>
            <div class="sev-cell"><button class="sev-btn" onclick="setSev(2,this)"><span class="sev-emoji">😐</span><div class="sev-label">輕微</div></button></div>
            <div class="sev-cell"><button class="sev-btn active" onclick="setSev(3,this)"><span class="sev-emoji">😑</span><div class="sev-label">中等</div></button></div>
            <div class="sev-cell"><button class="sev-btn" onclick="setSev(4,this)"><span class="sev-emoji">😣</span><div class="sev-label">嚴重</div></button></div>
            <div class="sev-cell"><button class="sev-btn" onclick="setSev(5,this)"><span class="sev-emoji">😭</span><div class="sev-label">劇烈</div></button></div>
          </div>
        </div>

        <!-- Step 4: Note -->
        <div class="panel">
          <div class="panel-header"><div class="step-badge">4</div>備註（選填）</div>
          <textarea class="note" id="noteIn" placeholder="例如：工作壓力大、睡眠不足..."></textarea>
        </div>

        <!-- Buttons -->
        <div class="btn-row">
          <button class="btn-clear" onclick="clearAll()">清除選擇</button>
          <button class="btn-save" id="saveBtn" onclick="saveRecord()">下一步 →</button>
        </div>

      </div><!-- /form-col -->

      <!-- ── Right: Records ── -->
      <div class="records-col">
        <div class="records-panel">
          <div class="records-top">
            <span class="records-title">頭痛紀錄一覽</span>
            <div class="records-actions">
              <button class="btn-export" onclick="exportCSV()">⬆ 匯出紀錄</button>
              <button class="btn-stats" onclick="showStats()">📊 查看統計分析</button>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>日期時間</th>
                  <th>位置</th>
                  <th>強度</th>
                  <th>備註</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="tbody"></tbody>
            </table>
          </div>
          <div class="pagination" id="pgn"></div>
        </div>
      </div>

    </div><!-- /content -->
  </div><!-- /main -->
</div><!-- /layout -->

<div class="toast" id="toast"></div>

<script>
// ── Data ──────────────────────────────────────────────────────────
const POINTS = {
  front: [
    { id:'top',         label:'頭頂',    acupoint:'百會穴', meridian:'督脈',           x:100, y:20,  color:'#5DCAA5' },
    { id:'forehead_c',  label:'前額中央', acupoint:'印堂穴', meridian:'督脈',           x:100, y:62,  color:'#5DCAA5' },
    { id:'forehead_r',  label:'右額頭',  acupoint:'陽白穴', meridian:'足少陽膽經',       x:68,  y:62,  color:'#9b8fc4' },

const HEAD_BG = {

    <line x1="100" y1="28" x2="100" y2="56" stroke="#b8956a" stroke-width="0.5" stroke-dasharray="3,2"/>
    <ellipse cx="76" cy="99" rx="14" ry="10" fill="#eddfc7" stroke="#c8a882" stroke-width="0.7"/>
    <ellipse cx="124" cy="99" rx="14" ry="10" fill="#eddfc7" stroke="#c8a882" stroke-width="0.7"/>
    <path d="M66 79 Q78 73 90 79" fill="none" stroke="#b8956a" stroke-width="0.9" stroke-linecap="round"/>
    <path d="M110 79 Q122 73 134 79" fill="none" stroke="#b8956a" stroke-width="0.9" stroke-linecap="round"/>

  back: `
    <ellipse cx="100" cy="120" rx="68" ry="92" fill="#ede0cc" stroke="#c8a882" stroke-width="1.3"/>

    <line x1="100" y1="30" x2="100" y2="56" stroke="#b8956a" stroke-width="0.6"/>
    <path d="M100 38 Q102 58 100 78" fill="none" stroke="#c8a882" stroke-width="0.9" stroke-linecap="round"/>
    <path d="M74 200 Q100 215 126 200" fill="none" stroke="#b8956a" stroke-width="0.9" stroke-linecap="round"/>
    <path d="M38 195 Q58 225 78 238" fill="none" stroke="#c8a882" stroke-width="1.1" stroke-linecap="round"/>
    <path d="M162 195 Q142 225 122 238" fill="none" stroke="#c8a882" stroke-width="1.1" stroke-linecap="round"/>`,
  side: `
    <ellipse cx="112" cy="120" rx="62" ry="90" fill="#f5e6d3" stroke="#c8a882" stroke-width="1.3"/>
    <path d="M70 55 Q112 28 150 50" fill="#c8956a"/>
    <path d="M150 50 Q157 65 152 82" fill="none" stroke="#c8a882" stroke-width="1.1"/>
    <path d="M70 95 Q66 122 70 148 Q73 168 78 180" fill="none" stroke="#c8a882" stroke-width="0.9"/>
    <ellipse cx="82" cy="132" rx="11" ry="14" fill="#f0dcc0" stroke="#c8a882" stroke-width="0.7"/>
    <path d="M78 162 Q85 172 82 182" fill="none" stroke="#c8a882" stroke-width="0.7"/>`
};

const DOT_COLORS = ['#5DCAA5','#9b8fc4','#c46a6a','#c4946a','#6a9fc4','#3d7a34'];
const SEV_EMOJI  = ['','😊','😐','😑','😣','😭'];
const SEV_LABEL  = ['','無微','輕微','中等','嚴重','劇烈'];

let curView = 'front';
let selected = new Set();
let curSev   = 3;
let records  = JSON.parse(localStorage.getItem('yiguan_v2') || '[]');
let curPage  = 1;
const PER_PAGE = 6;

// ── Helpers ──────────────────────────────────────────────────────
function getPoint(id) {
  for (const pts of Object.values(POINTS)) {
    const p = pts.find(x => x.id === id);
    if (p) return p;
  }
  return null;
}

function showToast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = 'toast'; }, 3500);
}

// ── SVG Render ───────────────────────────────────────────────────
function renderSvg() {
  const svg = document.getElementById('headSvg');
  const pts = POINTS[curView];
  let h = HEAD_BG[curView];

  pts.forEach(p => {
    const sel = selected.has(p.id);
    const r   = sel ? 11 : 8;
    const lx  = p.x > 105 ? p.x + 14 : p.x - 14;
    const anc = p.x > 105 ? 'start' : 'end';
    const la  = p.x > 148 ? 'start' : p.x < 52 ? 'end' : anc;

    h += `<g style="cursor:pointer" onclick="togglePoint('${p.id}')">
      <circle cx="${p.x}" cy="${p.y}" r="${r + 5}" fill="transparent"/>
      ${sel ? `<circle cx="${p.x}" cy="${p.y}" r="${r + 6}" fill="${p.color}" opacity="0.15"/>` : ''}
      <circle cx="${p.x}" cy="${p.y}" r="${r}" fill="${p.color}" opacity="${sel ? 1 : 0.72}"
        stroke="${sel ? '#fff' : 'none'}" stroke-width="${sel ? 2.5 : 0}"
        style="transition:all 0.12s"/>
      <text x="${p.x}" y="${p.y + 3.5}" text-anchor="middle" font-size="7.5"
        fill="white" font-weight="500" pointer-events="none" font-family="sans-serif">${p.label.slice(0,2)}</text>
    </g>
    <g pointer-events="none">
      <line x1="${p.x}" y1="${p.y}" x2="${lx + (p.x > 105 ? 3 : -3)}" y2="${p.y}"
        stroke="#c8a882" stroke-width="0.5" opacity="0.6"/>
      <text x="${lx + (p.x > 105 ? 5 : -5)}" y="${p.y + 3.5}" text-anchor="${la}"
        font-size="9" fill="#7a6a55" font-family="sans-serif">${p.label}</text>
    </g>`;
  });

  svg.innerHTML = h;
}

function togglePoint(id) {
  selected.has(id) ? selected.delete(id) : selected.add(id);
  renderSvg();
  renderSelList();
}

function switchView(v, el) {
  curView = v;
  document.querySelectorAll('.vtab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderSvg();
}

// ── Selected list ────────────────────────────────────────────────
function renderSelList() {
  const el = document.getElementById('selList');
  if (selected.size === 0) {
    el.innerHTML = '<div class="sel-empty">尚未選擇位置<br>可多選</div>';
    return;
  }
  let h = '';
  selected.forEach(id => {
    const p = getPoint(id); if (!p) return;
    h += `<div class="sel-item">
      <div class="sel-item-body">
        <div class="sel-item-name" style="color:${p.color}">${p.label}</div>
        <div class="sel-item-meridian">對應筋絡：${p.meridian}</div>
        <div class="sel-item-acupoint">${p.acupoint}</div>
      </div>
      <span class="sel-remove" onclick="togglePoint('${id}')">×</span>
    </div>`;
  });
  el.innerHTML = h;
}

// ── Severity ─────────────────────────────────────────────────────
function setSev(n, el) {
  curSev = n;
  document.querySelectorAll('.sev-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

// ── Clear ─────────────────────────────────────────────────────────
function clearAll() {
  selected.clear();
  renderSvg(); renderSelList();
  document.getElementById('noteIn').value = '';
  document.querySelectorAll('.sev-btn').forEach((b, i) => b.classList.toggle('active', i === 2));
  curSev = 3;
}

// ── Save & Sync ──────────────────────────────────────────────────
async function saveRecord() {
  const date = document.getElementById('dateIn').value;
  const time = document.getElementById('timeIn').value;
  if (!date || !time) { showToast('請選擇日期與時間', 'error'); return; }
  if (selected.size === 0) { showToast('請點選至少一個頭痛位置', 'error'); return; }

  const locs = [], meridians = [], acupoints = [];
  selected.forEach(id => {
    const p = getPoint(id);
    if (p) { locs.push(p.label); meridians.push(p.meridian); acupoints.push(p.acupoint); }
  });

  const rec = {
    id: Date.now(),
    datetime: date + ' ' + time,
    locs, meridians, acupoints,
    sev: curSev,
    note: document.getElementById('noteIn').value.trim()
  };

  records.unshift(rec);
  localStorage.setItem('yiguan_v2', JSON.stringify(records));
  curPage = 1;
  renderTable();

  const sid  = document.getElementById('sheetId').value.trim();
  const akey = document.getElementById('apiKey').value.trim();

  if (sid && akey) {
    showToast('同步至試算表中...', 'info');
    document.getElementById('saveBtn').disabled = true;
    try {
      const row = [
        rec.datetime,
        locs.join('、'), meridians.join('、'), acupoints.join('、'),
        rec.sev, SEV_LABEL[rec.sev], rec.note,
        new Date().toISOString()
      ];
      const url = `https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/Sheet1!A:H:append?valueInputOption=USER_ENTERED&key=${akey}`;
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ values: [row] })
      });
      if (res.ok) {
        showToast('✓ 已成功同步至 Google 試算表！', 'success');
      } else {
        const err = await res.json();
        console.error(err);
        showToast('同步失敗，請確認 API Key 與試算表權限', 'error');
      }
    } catch (e) {
      showToast('網路錯誤，紀錄已存本地', 'error');
    }
    document.getElementById('saveBtn').disabled = false;
  } else {
    showToast('✓ 紀錄已儲存（填入 API Key 可同步試算表）', 'success');
  }

  clearAll();
}

// ── Table ─────────────────────────────────────────────────────────
function renderTable() {
  const tbody = document.getElementById('tbody');
  const totalPages = Math.max(1, Math.ceil(records.length / PER_PAGE));
  if (curPage > totalPages) curPage = totalPages;
  const slice = records.slice((curPage - 1) * PER_PAGE, curPage * PER_PAGE);

  if (slice.length === 0) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="5">尚無紀錄，新增後顯示於此</td></tr>';
    renderPagination(totalPages);
    return;
  }

  tbody.innerHTML = slice.map(r => `
    <tr>
      <td style="white-space:nowrap;font-size:11px">${r.datetime}</td>
      <td>
        <div class="loc-chips">
          ${r.locs.map((l, i) => `
            <span class="loc-chip">
              <span class="dot" style="background:${DOT_COLORS[i % DOT_COLORS.length]}"></span>${l}
            </span>`).join('')}
        </div>
      </td>
      <td><span class="sev-face">${SEV_EMOJI[r.sev] || '—'}</span></td>
      <td class="note-cell" title="${r.note || ''}">${r.note || '—'}</td>
      <td style="white-space:nowrap">
        <button class="act-btn" title="刪除" onclick="delRecord(${r.id})">🗑</button>
      </td>
    </tr>`).join('');

  renderPagination(totalPages);
}

function renderPagination(total) {
  const pgn = document.getElementById('pgn');
  if (total <= 1) { pgn.innerHTML = ''; return; }
  let h = `<button class="pg-btn pg-arrow" onclick="goPage(${curPage - 1})">‹</button>`;
  for (let i = 1; i <= total; i++) {
    h += `<button class="pg-btn${i === curPage ? ' active' : ''}" onclick="goPage(${i})">${i}</button>`;
  }
  h += `<button class="pg-btn pg-arrow" onclick="goPage(${curPage + 1})">›</button>`;
  pgn.innerHTML = h;
}

function goPage(n) {
  const t = Math.ceil(records.length / PER_PAGE);
  if (n < 1 || n > t) return;
  curPage = n;
  renderTable();
}

function delRecord(id) {
  if (!confirm('確定要刪除這筆紀錄？')) return;
  records = records.filter(r => r.id !== id);
  localStorage.setItem('yiguan_v2', JSON.stringify(records));
  renderTable();
}

// ── Export CSV ───────────────────────────────────────────────────
function exportCSV() {
  if (records.length === 0) { showToast('尚無紀錄可匯出', 'error'); return; }
  const header = '日期時間,頭痛位置,對應筋絡,對應穴位,強度,強度說明,備註';
  const rows = records.map(r =>
    [r.datetime,
     '"' + r.locs.join('、') + '"',
     '"' + r.meridians.join('、') + '"',
     '"' + r.acupoints.join('、') + '"',
     r.sev, SEV_LABEL[r.sev],
     '"' + (r.note || '') + '"'
    ].join(',')
  ).join('\n');
  const blob = new Blob(['\ufeff' + header + '\n' + rows], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '頭痛紀錄_' + new Date().toISOString().slice(0, 10) + '.csv';
  a.click();
  showToast('✓ CSV 匯出成功！', 'success');
}

// ── Stats (placeholder) ───────────────────────────────────────────
function showStats() {
  if (records.length === 0) { showToast('尚無紀錄可分析', 'error'); return; }
  const freq = {};
  records.forEach(r => r.locs.forEach(l => { freq[l] = (freq[l] || 0) + 1; }));
  const top = Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, 3);
  const avgSev = (records.reduce((s, r) => s + r.sev, 0) / records.length).toFixed(1);
  showToast(`共 ${records.length} 筆 · 平均強度 ${avgSev} · 最常見：${top.map(x => x[0]).join('、')}`, 'info');
}

// ── Init ──────────────────────────────────────────────────────────
const now = new Date();
document.getElementById('dateIn').value = now.toISOString().slice(0, 10);
document.getElementById('timeIn').value = now.toTimeString().slice(0, 5);
renderSvg();
renderSelList();
renderTable();
</script>
